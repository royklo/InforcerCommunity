# Publish Inforcer module to PowerShell Gallery
# Runs on push to main (e.g. after merge). Bump ModuleVersion in Powershell/Inforcer.psd1 before merging.
name: Publish to PowerShell Gallery

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  publish:
    name: Publish module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          Invoke-Pester ./Powershell/Tests/Consistency.Tests.ps1 -PassThru
        shell: pwsh

      - name: Publish to PowerShell Gallery
        run: |
          $apiKey = $env:PS_GALLERY_API_KEY
          if (-not $apiKey) { throw 'PS_GALLERY_API_KEY secret is not set. Add it in repo Settings > Secrets and variables > Actions.' }
          Publish-Module -Path ./Powershell -NuGetApiKey $apiKey -Verbose
        env:
          PS_GALLERY_API_KEY: ${{ secrets.PS_GALLERY_API_KEY }}
        shell: pwsh
